server {
    listen 80;
    server_name example.com;
    
    # Przekierowanie całego ruchu HTTP na HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    client_max_body_size 55M;

    # Certyfikaty montowane jako wolumeny z hosta (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Obsługa Frontendu (React/Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Obsługa routingu po stronie klienta (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Proxy dla API Backendu
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy dla modułu logowania
    location /login/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
