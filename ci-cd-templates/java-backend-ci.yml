# Szablon CI dla aplikacji Java/Gradle
# Wykonuje testy jednostkowe, generuje raport JaCoCo i wypisuje pokrycie kodu w podsumowaniu Actions.

name: Java CI (Gradle)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Tests with JaCoCo
        run: ./gradlew test jacocoTestReport

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: Export Coverage to Step Summary
        # Ten krok parsuje plik CSV z JaCoCo i wylicza procent pokrycia kodu
        run: |
            REPORT_FILE=build/reports/jacoco/test/jacocoTestReport.csv
            if [ -f "$REPORT_FILE" ]; then
              PERCENT=$(awk -F"," 'NR>1 {missed+=$4; covered+=$5} END { if ((missed+covered)>0) printf "%.2f", (covered/(missed+covered))*100; else print "0" }' $REPORT_FILE)
              echo "### Code Coverage: ${PERCENT}%" >> $GITHUB_STEP_SUMMARY
            else
              echo "### JaCoCo report not found!" >> $GITHUB_STEP_SUMMARY
            fi
